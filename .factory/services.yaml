commands:
  install: bun install
  dev: PORT=3100 bun run dev
  build: bun run build
  test: bun run test
  typecheck: bun run typecheck
  lint: bun run lint
  db:push: bunx prisma db push
  db:seed: bunx prisma db seed
  db:studio: bunx prisma studio

services:
  web:
    start: PORT=3100 bun run dev
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100
    port: 3100
    depends_on: []
